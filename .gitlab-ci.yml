stages:
  - build
  - docker-build

variables:
  # Using GitLab's standard CI environment variables for the registry.
  # You can override these with your own custom environment variables.
  REGISTRY_URL: $CI_REGISTRY
  REGISTRY_USER: $CI_REGISTRY_USER
  REGISTRY_PASSWORD: $CI_REGISTRY_PASSWORD
  IMAGE_NAME: $CI_REGISTRY_IMAGE

build:
  stage: build
  image: node:22-alpine
  before_script:
    - npm install -g pnpm@latest
  script:
    # 1. Install dependencies
    - pnpm install --frozen-lockfile
    # 2. Build the project
    - pnpm run build
    # 3. Pack the output using npm and save the tarball into an artifacts directory
    - mkdir -p artifacts
    - npm pack --pack-destination artifacts
  artifacts:
    paths:
      - artifacts/*.tgz
    expire_in: 1 hour
  only:
    - master
    - tags

docker-build:
  stage: docker-build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
  before_script:
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASSWORD $REGISTRY_URL
  script:
    # Locate the tarball artifact generated in the previous step
    - PACKAGE_TARBALL=$(ls artifacts/*.tgz | head -n 1)
    - echo "Building Docker image with tarball $PACKAGE_TARBALL"
    # Build the image using Dockerfile.release, passing the tarball as a build argument
    - docker build
      --build-arg PACKAGE_TARBALL=$PACKAGE_TARBALL
      -f distribution/containers/Dockerfile.release
      -t $REGISTRY_URL/$IMAGE_NAME:$CI_COMMIT_REF_NAME .
    # Push the image to your configurable registry
    - docker push $REGISTRY_URL/$IMAGE_NAME:$CI_COMMIT_REF_NAME
  only:
    - master
    - tags
