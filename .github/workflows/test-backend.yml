name: Test backend

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-backend-matrix:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node: ['22', '24']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install qbittorrent-nox
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo userdocs/qbittorrent-nox-static --pattern 'x86_64-qbittorrent-nox' --dir /tmp
          mv /tmp/x86_64-qbittorrent-nox /usr/local/bin/qbittorrent-nox
          chmod +x /usr/local/bin/qbittorrent-nox

      - run: sudo apt-get install -y transmission-daemon

      - run: |
          wget https://github.com/jesec/rtorrent/releases/latest/download/rtorrent-linux-amd64.deb
          sudo dpkg -i rtorrent-linux-amd64.deb

      - run: pnpm install --frozen-lockfile
      - run: pnpm run test || pnpm run test || pnpm run test
        env:
          FLOOD_OPTION_ASSETS: 'false'

      - uses: codecov/codecov-action@v3
        if: matrix.node == '24'

  test-backend:
    # so we do not need to update GitHub repo config
    runs-on: ubuntu-slim
    needs:
      - test-backend-matrix
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.test-backend-matrix.result }}" != "success" ]]; then
            exit 1
          fi
